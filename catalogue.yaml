- name: setup catalogue server
  hosts: catalogue
  become: yes
  tasks: 
    - name: disable default nodejs
      ansible.builtin.command: dnf module disable nodejs -y

    - name: enable nodejs
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: install nodejs
      ansible.builtin.package: 
        name: nodejs
        state: present

    - name: create user
      ansible.builtin.user:
        name: roboshop
        system: true
        home: /app
        shell: /sbin/nologin
        comment: roboshop system user
    
    #safe to remove the existing directory to create it freshly to avoid incovinience
    - name: remove app directory
      ansible.builtin.file: 
        path: /app
        start: absent

    - name: create app directory
      ansible.builtin.file: 
        state: directory
        path: /app

    - name: remove catalogue file
      ansible.builtin.file: 
        path: /tmp/catalogue.zip
        state: absent

    - name: download catalogue file
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip

    - name: Unarchive catalogue file
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes

    - name: Install dependencies
      community.general.npm:
        name: npm
        path: /app
   
    - name: copy catalogue service
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service

    - name: copy mongodb server
      ansible.builtin.copy: 
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo

    - name: install mongodb
      ansible.builtin.package: 
        name: mongodb-mongosh
        state: present

    - name: connect to mongodb catalogue
      ansible.builtin.command: mongosh mongodb.awspractice.sbs --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
      register: catalogue_output

    - name: load products into mongodb
      ansible.builtin.shell: mongosh --host mongodb.awspractice.sbs </app/db/master-data.js
      when: catalogue_output.stdout | int < 0

    - name: daemon start enable reload
      ansible.builtin.systemd_service:
        state: started
        daemon_reload: true
        name: catalogue
        enabled: true 
    