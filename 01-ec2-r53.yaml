- name: create ec2 and r53
  hosts: local
  connection: local
  vars:
    ami_id: ami-09c813fb71547fc4f
    sg_id: sg-0875527a45843a641
    zone_id: "Z02830603L4HY1KNLN98V"
    domain_name: "awspractice.sbs"
    instances:

  tasks:
  - name: create ec2 instances
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      image_id: "{{ ami_id }}"
      instance_type: t3.micro
      security_group: "{{ sg_id }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output


  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}.{{ domain_name}}"
      type: A
      value: "{{ item.instances[0].private_ip_address }}"
      ttl: 1
    loop: "{{ ec2_output.results }}"
    
    #we are creating one record with public ip only for frontend
  - name: create r53 record for frontend
    state: present
    zone: "{{ domain_name }}"
    record: "{{ domain_name }}"
    type: A
    value: "{{ item.instances[0].public_ip_address }}"
    ttl: 1
  while: item.item == "frontend"
  loop: "{{ ec2_output.results }}"