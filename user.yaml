- name: setup user server
  hosts: user
  become: yes
  tasks: 
    - name: disable default nodejs
      ansible.builtin.command: dnf module disable nodejs -y

    - name: enable nodejs 
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: install nodejs
      ansible.builtin.package: 
        name: nodejs
        state: present

    - name: create user
      ansible.builtin.user:
        name: roboshop
        system: true
        home: /app
        shell: /sbin/nologin
        comment: roboshop system user

     #safe to remove the existing directory to create it freshly to avoid incovinience
    - name: remove app directory
      ansible.builtin.file: 
        path: /app
        state: absent

    - name: create app directory
      ansible.builtin.file: 
        state: directory
        path: /app
    
    - name: remove user file
      ansible.builtin.file: 
        path: /tmp/user.zip
        state: absent

    - name: download user file
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
        dest: /tmp/user.zip

    - name: Unarchive user file
      ansible.builtin.unarchive:
        src: /tmp/user.zip
        dest: /app
        remote_src: yes

    - name: Install dependencies
      community.general.npm:
        name: npm
        path: /app

    - name: copy user service
      ansible.builtin.copy:
        src: user.service
        dest: /etc/systemd/system/user.service

    - name: daemon start enable reload
      ansible.builtin.systemd_service:
        state: started
        daemon_reload: true
        name: user
        enabled: true 