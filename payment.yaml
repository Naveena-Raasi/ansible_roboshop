- name: setup payment server
  hosts: payment
  become: yes
  tasks: 
    - name: install python3 
      ansible.builtin.dnf: 
        name: python3
        start: present

    - name: install gcc
      ansible.builtin.dnf: 
        name: gcc
        state: present

    - name: install
      ansible.builtin.dnf:
        name: python3-devel
        state: present

    - name: create user
      ansible.builtin.user:
        name: roboshop
        system: true
        home: /app
        shell: /sbin/nologin
        comment: roboshop system user


    #safe to remove the existing directory to create it freshly to avoid incovinience
    - name: remove app directory
      ansible.builtin.file: 
        path: /app
        state: absent

    - name: create app directory
      ansible.builtin.file: 
        state: directory
        path: /app

    - name: remove payment file
      ansible.builtin.file: 
        path: /tmp/payment.zip
        state: absent

    - name: download payment file
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
        dest: /tmp/payment.zip

    - name: Unarchive payment file
      ansible.builtin.unarchive:
        src: /tmp/payment.zip
        dest: /app
        remote_src: yes

    - name: Install python package
      ansible.builtin.pip:
        name: pip3

    - name: copy payment service
      ansible.builtin.copy:
        src: payment.service
        dest: /etc/systemd/system/payment.service

    - name: daemon start enable reload
      ansible.builtin.systemd_service:
        state: started
        daemon_reload: true
        name: payment
        enabled: true 